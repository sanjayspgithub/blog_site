{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BB Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <link href="{% static 'css/register.css' %}" rel="stylesheet">

</head>
<body>
  <div class="body">
  <div class="card">
    <div class="logo">
      <p href="{% url "home" %}" class="logo-name">BB</p>
    </div>

    <h1>Sign in</h1>
    <form method="POST">
      {% csrf_token %}

      {% if form.errors %}
      <p style="color:red; text-align:center;">
        Invalid Username or Password
      </p>
      {% endif %}

      <div class="field">
        <label>User Name</label>
        <input type="text" name="username" placeholder="your@email.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••" />
      </div>

      <button type="submit" class="btn-signin">Sign in</button>

    </form>
    <div class="acc">
      <p>Don't have an account? <a href="{% url "register" %}">Sign up</a></p>
    </div>
  </div>
  </div>

  <script src="{% static 'js/disable_shortcuts.js' %}"></script>
</body>
</html>
