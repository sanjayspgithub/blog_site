{% extends "dashboard/base.html" %}

{% block content %}

    <div class="main-wrapper">
        
        <header class="admin-header">
            <div class="flex items-center gap-4">
                <button class="lg:hidden text-slate-500 text-xl" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <h2 class="text-xl font-bold text-[#0B1C33]">Add New Category</h2>
            </div>
            <div class="flex items-center gap-3">
                <div class=" flex items-center justify-center font-bold text-slate-600">{{ user }}</div>
            </div>
        </header>

        <div class="flex justify-center items-center min-h-[70vh]">
    
            <form method="POST" class="bg-white p-6 rounded-lg shadow w-full max-w-md">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="block text-sm rounded-lg font-bold mb-1">Category Name</label>
                    {{ form.category_name }}
                    <small class="text-red-500">{{ form.category_name.errors }}</small>
                </div>

                <button type="submit"
                    class="w-full px-5 py-2.5 bg-[#DC2626] text-white rounded-lg font-bold hover:bg-[#b91c1c]">
                    Add Category
                </button>
            </form>

        </div>

        
    </div>

{% endblock  %}
